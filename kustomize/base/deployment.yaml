apiVersion: apps/v1
kind: Deployment
metadata:
  name: egress-checker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: egress-checker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: egress-checker
    spec:
      containers:
        - name: egress-checker
          image: egress-checker:latest
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: EGRESS_CHECKER_CONFIG
              value: /etc/egress-checker/config.yaml
            - name: EGRESS_CHECKER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"
          volumeMounts:
            - name: config
              mountPath: /etc/egress-checker
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: egress-checker-config
